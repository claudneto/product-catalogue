@if (products().length > 0) {
  <div class="product-list" [class.product-list--compact]="isCompactLayout()">
    @for (product of products(); track product.nid) {
      <lib-product-card [product]="product"></lib-product-card>
    }
  </div>
} @else {
  <p class="product-list__empty">Nenhum produto encontrado.</p>
}
