<footer class="footer" aria-label="Rodape institucional">
  <div class="footer__brand">
    <div class="footer__logo">
      <ng-content select="[footerLogo]"></ng-content>
    </div>

    <p class="footer__description">
      Solucoes em nutricao e cuidado para apoiar uma jornada de saude mais simples e confiavel.
    </p>
  </div>

  <nav class="footer__nav" aria-label="Links institucionais">
    @for (link of footerLinks; track link.id) {
    <a class="footer__link" [href]="link.href"> {{ link.label }} </a>
    }
  </nav>

  <p class="footer__meta">© {{ currentYear }} Nestle Saude. Todos os direitos reservados.</p>
</footer>
